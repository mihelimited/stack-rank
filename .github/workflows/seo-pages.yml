name: Build SEO pages

on:
  schedule:
    # Top of every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      min_rankings:
        description: 'Minimum rankings required to generate a page'
        required: false
        default: '10'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --omit=dev

      - name: Generate SEO pages
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          STACK_RANK_SITE_URL: https://mihelimited.github.io/stack-rank
        run: |
          node scripts/build-seo-pages.mjs --min-rankings=${{ github.event.inputs.min_rankings || 10 }}

      - name: Commit + push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add top/ sitemap.xml 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No SEO page changes."
          else
            git commit -m "chore(seo): refresh community ranking pages"
            git push
          fi
